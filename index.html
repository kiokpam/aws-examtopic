<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Luyện Trắc Nghiệm - Bản Cập Nhật</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #2b579a;
            --secondary-color: #e8f1f5;
            --accent-color: #107c41;
            --warning-color: #fff3cd;
            --warning-border: #ffeeba;
            --warning-text: #856404;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
        }

        .status-container {
            padding: 15px;
            background: var(--secondary-color);
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 500;
            color: #444;
            border: 1px solid #d0e1ec;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #1e3d6b;
        }

        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }

        .quiz-section {
            display: none;
            margin-top: 20px;
        }

        .progress-text {
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
        }

        .question-card {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-list {
            list-style-type: none;
            padding: 0;
        }

        .option-item {
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            background-color: var(--secondary-color);
            border-color: var(--primary-color);
        }

        .option-prefix {
            font-weight: bold;
            margin-right: 10px;
            background: #eee;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }

        .incorrect {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }

        .mismatch-alert {
            margin-top: 15px;
            padding: 12px;
            background-color: var(--warning-color);
            border: 1px solid var(--warning-border);
            color: var(--warning-text);
            border-radius: 5px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .history-table th, .history-table td {
            border: 1px solid #ddd;
            padding: 12px 10px;
            text-align: left;
            font-size: 14px;
        }

        .history-table th {
            background-color: #f2f2f2;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 12px;
            display: inline-block;
        }

        .status-correct { background-color: #d4edda; color: #155724; }
        .status-incorrect { background-color: #f8d7da; color: #721c24; }
        
        .row-warning {
            background-color: #fffdf5;
        }
        
        .badge-correct-ans {
            background-color: var(--warning-color);
            color: var(--warning-text);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--warning-border);
            display: inline-block;
            margin-top: 4px;
        }

        .actions {
            margin-top: 20px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ứng Dụng Ôn Thi Trắc Nghiệm</h1>
    
    <div id="statusMessage" class="status-container">
        ⏳ Hệ thống đang tự động tải tệp dữ liệu đề thi cố định...
    </div>

    <div id="quizSection" class="quiz-section">
        <div class="progress-text" id="progressText">Câu hỏi: 0 / 0</div>
        
        <div class="question-card">
            <div class="question-text" id="questionText">Nội dung câu hỏi đang tải...</div>
            <ul class="options-list" id="optionsList">
                </ul>
            
            <div id="mismatchAlert" class="mismatch-alert"></div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" id="btnNext" disabled onclick="nextQuestion()">Câu Tiếp Theo</button>
            <button class="btn btn-danger" style="background-color: #dc3545;" onclick="resetQuiz()">Reset Luyện Tập</button>
        </div>
    </div>

    <div class="history-section" id="historySection" style="display:none;">
        <h3>Lịch Sử Làm Bài (Theo đáp án Community Vote)</h3>
        <div style="overflow-x:auto;">
            <table class="history-table">
                <thead>
                    <tr>
                        <th style="width: 5%;">STT</th>
                        <th style="width: 35%;">Câu hỏi</th>
                        <th style="width: 25%;">Đáp án đúng (Community)</th>
                        <th style="width: 25%;">Bạn đã chọn</th>
                        <th style="width: 10%; text-align: center;">Kết quả</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ĐƯỜNG DẪN ĐẾN FILE CỐ ĐỊNH CỦA BẠN TRÊN SERVER
    const FILE_SOURCE_URL = 'public/quiz_data_output.xlsx'; 

    let allQuestions = [];       
    let remainingIndices = [];   
    let currentQuestionIndex = null; 
    let historyLog = [];         

    window.onload = function() {
        fetchDataFromServer();
    };

    function fetchDataFromServer() {
        const statusDiv = document.getElementById('statusMessage');
        
        fetch(FILE_SOURCE_URL)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Không tìm thấy file nguồn cố định tại vị trí: ${FILE_SOURCE_URL}`);
                }
                return response.arrayBuffer();
            })
            .then(buffer => {
                const data = new Uint8Array(buffer);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                
                if(jsonData.length === 0) {
                    throw new Error("Cơ sở dữ liệu của file trống!");
                }

                // Đồng bộ cấu trúc đọc dữ liệu (Question | A | B | C | D | E | Correct | Community_Vote)
                allQuestions = jsonData.map(item => {
                    let q = item.Question || item.question || item['Câu hỏi'] || Object.values(item)[0];
                    let a = item.A || item.a || '';
                    let b = item.B || item.b || '';
                    let c = item.C || item.c || '';
                    let d = item.D || item.d || '';
                    let e = item.E || item.e || '';
                    
                    // Lấy đáp án của Hãng (Correct)
                    let correct = (item.Correct || item.correct || item['Đáp án'] || '').toString().trim().toUpperCase();
                    
                    // Lấy đáp án của Cộng đồng (Community_Vote). Nếu cột này rỗng, lấy tạm cột Correct.
                    let community = (item.Community_Vote || item.community_vote || item.Community_vote || item['Community_Vote'] || correct).toString().trim().toUpperCase();

                    return { question: q, A: a, B: b, C: c, D: d, E: e, correct: correct, community: community };
                }).filter(item => item.question);

                if (allQuestions.length === 0) {
                    throw new Error("Không phân tích được dòng câu hỏi nào hợp lệ!");
                }

                statusDiv.style.backgroundColor = "#d4edda";
                statusDiv.style.borderColor = "#c3e6cb";
                statusDiv.style.color = "#155724";
                statusDiv.innerText = `✅ Đã kết nối thành công bộ đề gồm ${allQuestions.length} câu hỏi. Chúc bạn ôn tập tốt!`;
                
                resetQuiz();
            })
            .catch(error => {
                console.error(error);
                statusDiv.style.backgroundColor = "#f8d7da";
                statusDiv.style.borderColor = "#f5c6cb";
                statusDiv.style.color = "#721c24";
                statusDiv.innerHTML = `❌ <strong>Lỗi kết nối tệp:</strong> ${error.message}<br><small>Lưu ý: Bạn cần đưa website lên hosting (như GitHub Pages) cùng file <strong>${FILE_SOURCE_URL}</strong> để trình duyệt không chặn bảo mật CORS.</small>`;
            });
    }

    function resetQuiz() {
        if(allQuestions.length === 0) return;
        remainingIndices = [...Array(allQuestions.length).keys()];
        historyLog = [];
        
        document.getElementById('quizSection').style.display = 'block';
        document.getElementById('historySection').style.display = 'block';
        
        updateHistoryTable();
        loadRandomQuestion();
    }

    function loadRandomQuestion() {
        // Ẩn vùng thông báo lệch đáp án của câu trước
        document.getElementById('mismatchAlert').style.display = 'none';

        if (remainingIndices.length === 0) {
            document.getElementById('questionText').innerHTML = "🎉 Tuyệt vời! Bạn đã hoàn thành toàn bộ tất cả câu hỏi trong hệ thống.";
            document.getElementById('optionsList').innerHTML = "";
            document.getElementById('btnNext').disabled = true;
            document.getElementById('progressText').innerText = `Tiến trình: ${allQuestions.length} / ${allQuestions.length} (Hoàn thành)`;
            return;
        }

        const randomIndexInRemaining = Math.floor(Math.random() * remainingIndices.length);
        currentQuestionIndex = remainingIndices[randomIndexInRemaining];
        remainingIndices.splice(randomIndexInRemaining, 1);

        const qData = allQuestions[currentQuestionIndex];
        const answeredCount = allQuestions.length - remainingIndices.length;
        document.getElementById('progressText').innerText = `Câu hỏi: ${answeredCount} / ${allQuestions.length}`;
        document.getElementById('questionText').innerText = qData.question;
        
        const optionsList = document.getElementById('optionsList');
        optionsList.innerHTML = '';
        
        // Duyệt qua cả 5 đáp án có thể có A, B, C, D, E
        const choices = ['A', 'B', 'C', 'D', 'E'];
        choices.forEach(choice => {
            if (qData[choice] && qData[choice].toString().trim() !== "") {
                const li = document.createElement('li');
                li.className = 'option-item';
                li.innerHTML = `<span class="option-prefix">${choice}</span> <span class="option-text">${qData[choice]}</span>`;
                li.onclick = function() { selectOption(this, choice); };
                optionsList.appendChild(li);
            }
        });

        document.getElementById('btnNext').disabled = true;
    }

    function selectOption(element, selectedChoice) {
        const qData = allQuestions[currentQuestionIndex];
        const options = document.querySelectorAll('.option-item');
        
        // Khóa các ô đáp án
        options.forEach(opt => opt.onclick = null);

        // Chấm điểm theo Community Vote làm gốc
        const isCorrectWithCommunity = (selectedChoice === qData.community);
        
        options.forEach(opt => {
            const prefix = opt.querySelector('.option-prefix').innerText;
            if (prefix === qData.community) {
                opt.classList.add('correct'); // Màu xanh cho đáp án đúng theo Community
            }
            if (prefix === selectedChoice && !isCorrectWithCommunity) {
                opt.classList.add('incorrect'); // Màu đỏ nếu chọn sai ý số đông
            }
        });

        // XỬ LÝ ĐÁP ÁN PHỤ (CORRECT ANSWER) HIỂN THỊ MÀU VÀNG NẾU KHÁC NHAU
        const isDifferent = (qData.community !== qData.correct);
        if (isDifferent) {
            const alertDiv = document.getElementById('mismatchAlert');
            const correctTextDetail = qData[qData.correct] ? `${qData.correct}. ${qData[qData.correct]}` : qData.correct;
            alertDiv.innerHTML = `⚠️ <strong>Lưu ý lệch đáp án:</strong> Câu này đáp án của hãng thiết kế đề chọn là <strong>[${qData.correct}]</strong>, nhưng số đông Cộng đồng bình chọn đáp án tối ưu hơn là <strong>[${qData.community}]</strong>.`;
            alertDiv.style.display = 'block';
        }

        // Tạo văn bản đầy đủ bằng lời để lưu lịch sử
        const communityTextFull = qData[qData.community] ? `${qData.community}. ${qData[qData.community]}` : `${qData.community}`;
        const userSelectTextFull = `${selectedChoice}. ${qData[selectedChoice]}`;
        const correctTextFull = qData[qData.correct] ? `${qData.correct}. ${qData[qData.correct]}` : `${qData.correct}`;

        historyLog.unshift({
            question: qData.question,
            communityFull: communityTextFull,
            userSelectFull: userSelectTextFull,
            correctFull: correctTextFull,
            isCorrect: isCorrectWithCommunity,
            hasMismatch: isDifferent
        });

        updateHistoryTable();
        document.getElementById('btnNext').disabled = false;
    }

    function nextQuestion() {
        loadRandomQuestion();
    }

    function updateHistoryTable() {
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';

        if(historyLog.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding: 20px;">Lịch sử rỗng. Vui lòng trả lời câu hỏi phía trên.</td></tr>`;
            return;
        }

        historyLog.forEach((log, index) => {
            const row = document.createElement('tr');
            
            // Nếu câu này có sự sai lệch đáp án giữa Hãng và Cộng đồng, thêm class màu nền vàng nhạt cho hàng đó
            if (log.hasMismatch) {
                row.className = 'row-warning';
            }

            const badge = log.isCorrect 
                ? '<span class="status-badge status-correct">Đúng</span>' 
                : '<span class="status-badge status-incorrect">Sai</span>';

            const userChoiceStyle = log.isCorrect 
                ? 'color: #155724; font-weight: 500;' 
                : 'color: #721c24; font-weight: 500;';

            // Cột đáp án đúng hiển thị text của Community, và chèn thêm nhãn phụ màu vàng phía dưới nếu có lệch đáp án hãng
            let correctColumnHTML = `<div style="color: var(--accent-color); font-weight: 500;">${log.communityFull}</div>`;
            if (log.hasMismatch) {
                correctColumnHTML += `<div class="badge-correct-ans">Đáp án hãng: ${log.correctFull}</div>`;
            }

            row.innerHTML = `
                <td>${historyLog.length - index}</td>
                <td>${log.question}</td>
                <td>${correctColumnHTML}</td>
                <td style="${userChoiceStyle}">${log.userSelectFull}</td>
                <td style="text-align:center;">${badge}</td>
            `;
            tbody.appendChild(row);
        });
    }
</script>

</body>
</html>
